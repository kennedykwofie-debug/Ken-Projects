name: Bootstrap DARKWATCH Intelligence
on:
  workflow_dispatch:
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract and install intelligence service
        run: |
          mkdir -p intelligence
          python3 -c "import base64,tarfile,io; data=base64.b64decode(''); tarfile.open(fileobj=io.BytesIO(data)).extractall('intelligence')"
          find intelligence/ -type f | head -40
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add intelligence/
          git diff --cached --quiet || git commit -m "feat: add DARKWATCH Pro intelligence service"
          git push
